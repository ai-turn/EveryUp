services:
  everyup:
    # To use a pre-built image from Docker Hub instead of building locally:
    #   image: aiturn/everyup:latest
    # To build from source:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: everyup
    ports:
      - "${MT_SERVER_PORT:-3001}:3001"
    volumes:
      - everyup-data:/app/data
    env_file:
      - path: .env
        required: false  # copy .env.example → .env to customize
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  everyup-data:
    driver: local
